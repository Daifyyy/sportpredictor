name: Daily Resolve

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache API responses and calibrators
        uses: actions/cache@v4
        with:
          path: |
            cache/football.db
            models/saved
          key: predictor-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            predictor-cache-${{ runner.os }}-
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run resolve
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/resolve.py
